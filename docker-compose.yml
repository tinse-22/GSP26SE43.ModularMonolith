services:
    db:
        image: "postgres:16"
        ports:
            - "${POSTGRES_HOST_PORT:-55432}:5432"
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 5s
            timeout: 5s
            retries: 12
            start_period: 10s
        volumes:
            - postgres_data:/var/lib/postgresql/data
    rabbitmq:
        image: "rabbitmq:3-management"
        environment:
          RABBITMQ_DEFAULT_USER: ${Messaging__RabbitMQ__UserName:-guest}
          RABBITMQ_DEFAULT_PASS: ${Messaging__RabbitMQ__Password:-guest}
        ports:
          - "5672:5672"
          - "15672:15672"
        healthcheck:
          test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
          interval: 5s
          timeout: 10s
          retries: 12
          start_period: 10s
    mailhog:
        image: mailhog/mailhog
        ports: 
          - 1025:1025 # smtp server
          - 8025:8025 # web ui
    redis:
        image: "redis:7-alpine"
        ports:
          - "6379:6379"
        volumes:
          - redis_data:/data
        command: redis-server --appendonly yes
        healthcheck:
          test: ["CMD", "redis-cli", "ping"]
          interval: 5s
          timeout: 5s
          retries: 12
          start_period: 5s
    migrator:
        image: classifiedads.modularmonolith.migrator
        build:
          context: .
          dockerfile: ./ClassifiedAds.Migrator/Dockerfile
        depends_on:
          db:
            condition: service_healthy
        environment:
          DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT}
          ConnectionStrings__Default: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
          CheckDependency__Enabled: "true"
          CheckDependency__Host: "db:5432"
    webapi:
        image: classifiedads.modularmonolith.webapi
        build:
          context: .
          dockerfile: ./ClassifiedAds.WebAPI/Dockerfile
        ports:
            - "9002:8080"
        depends_on:
          db:
            condition: service_healthy
          migrator:
            condition: service_completed_successfully
          rabbitmq:
            condition: service_healthy
          redis:
            condition: service_healthy
        environment:
          ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
          ConnectionStrings__Default: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
          Messaging__Provider: "RabbitMQ"
          Messaging__RabbitMQ__HostName: "rabbitmq"
          Messaging__RabbitMQ__UserName: ${Messaging__RabbitMQ__UserName:-guest}
          Messaging__RabbitMQ__Password: ${Messaging__RabbitMQ__Password:-guest}
          Caching__Distributed__Provider: "Redis"
          Caching__Distributed__Redis__Configuration: "redis:6379"
          Caching__Distributed__Redis__InstanceName: "ClassifiedAds_"
          Modules__Identity__BootstrapDevelopmentData: "true"
          Modules__Identity__Jwt__SecretKey: ${Modules__Identity__Jwt__SecretKey}
          Modules__Identity__Jwt__Issuer: ${Modules__Identity__Jwt__Issuer}
          Modules__Identity__Jwt__Audience: ${Modules__Identity__Jwt__Audience}
          Modules__Storage__Provider: "Local"
          Modules__Storage__Local__Path: "/files"
    background:
        image: classifiedads.modularmonolith.background
        build:
          context: .
          dockerfile: ./ClassifiedAds.Background/Dockerfile
        depends_on:
          db:
            condition: service_healthy
          migrator:
            condition: service_completed_successfully
          rabbitmq:
            condition: service_healthy
          redis:
            condition: service_healthy
          mailhog:
            condition: service_started
        environment:
          DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT}
          CheckDependency__Enabled: "true"
          CheckDependency__Host: "rabbitmq:5672"
          Messaging__Provider: "RabbitMQ"
          Messaging__RabbitMQ__HostName: "rabbitmq"
          Messaging__RabbitMQ__UserName: ${Messaging__RabbitMQ__UserName:-guest}
          Messaging__RabbitMQ__Password: ${Messaging__RabbitMQ__Password:-guest}
          Caching__Distributed__Provider: "Redis"
          Caching__Distributed__Redis__Configuration: "redis:6379"
          Caching__Distributed__Redis__InstanceName: "ClassifiedAds_"
          ConnectionStrings__Default: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
          Modules__Notification__Email__Provider: "SmtpClient"
          Modules__Notification__Email__SmtpClient__Host: "mailhog"
          Modules__Notification__Email__SmtpClient__Port: "1025"
          Modules__Notification__Email__SmtpClient__EnableSsl: "false"
          Modules__Notification__EmailQueue__ChannelCapacity: "64"
          Modules__Notification__EmailQueue__MaxDegreeOfParallelism: "3"
          Modules__Notification__EmailQueue__MaxRetryAttempts: "5"
          Modules__Notification__EmailQueue__SendTimeoutSeconds: "30"
          Modules__Notification__Sms__Provider: "Fake"
          Modules__Notification__Sms__Twilio__AccountSId: ""
          Modules__Notification__Sms__Twilio__AuthToken: ""
          Modules__Notification__Sms__Twilio__FromNumber: ""
          Modules__Notification__Web__Provider: "Fake"
          Modules__Notification__Web__SignalR__Endpoint: "http://notificationserver"
          Modules__Storage__Provider: "Local"
          Modules__Storage__Local__Path: "/files"

volumes:
    postgres_data:
    redis_data:
