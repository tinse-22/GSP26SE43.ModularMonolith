services:
  rabbitmq:
    image: "rabbitmq:3-management"
    environment:
      RABBITMQ_DEFAULT_USER: ${Messaging__RabbitMQ__UserName:-guest}
      RABBITMQ_DEFAULT_PASS: ${Messaging__RabbitMQ__Password:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 10s

  mailhog:
    image: mailhog/mailhog
    ports:
      - 1025:1025 # smtp server
      - 8025:8025 # web ui

  redis:
    image: "redis:7-alpine"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

  migrator:
    image: classifiedads.modularmonolith.migrator
    build:
      context: .
      dockerfile: ./ClassifiedAds.Migrator/Dockerfile
    environment:
      DOTNET_ENVIRONMENT: "${DOTNET_ENVIRONMENT:-Development}"
      ConnectionStrings__Default: "${SUPABASE_CONNECTION_STRING:?SUPABASE_CONNECTION_STRING must be set for Supabase deployment}"
      CheckDependency__Enabled: "true"
      CheckDependency__Host: "${SUPABASE_CHECKDEPENDENCY_HOST:-db.pdmbghlidmoobbjsuxgx.supabase.co:5432}"

  webapi:
    image: classifiedads.modularmonolith.webapi
    build:
      context: .
      dockerfile: ./ClassifiedAds.WebAPI/Dockerfile
    ports:
      - "9002:8080"
    depends_on:
      migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
        required: false
    environment:
      ASPNETCORE_ENVIRONMENT: "${ASPNETCORE_ENVIRONMENT:-Development}"
      ConnectionStrings__Default: "${SUPABASE_CONNECTION_STRING:?SUPABASE_CONNECTION_STRING must be set for Supabase deployment}"
      Messaging__Provider: "RabbitMQ"
      Messaging__RabbitMQ__HostName: "rabbitmq"
      Messaging__RabbitMQ__UserName: ${Messaging__RabbitMQ__UserName:-guest}
      Messaging__RabbitMQ__Password: ${Messaging__RabbitMQ__Password:-guest}
      Caching__Distributed__Provider: "Redis"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      Caching__Distributed__Redis__InstanceName: "${Caching__Distributed__Redis__InstanceName:-ClassifiedAds_}"
      Modules__Identity__BootstrapDevelopmentData: "true"
      Modules__Identity__Jwt__SecretKey: "${Modules__Identity__Jwt__SecretKey:-ClassifiedAds-JWT-Secret-Key-Must-Be-At-Least-32-Characters-Long-2026!}"
      Modules__Identity__Jwt__Issuer: "${Modules__Identity__Jwt__Issuer:-ClassifiedAds}"
      Modules__Identity__Jwt__Audience: "${Modules__Identity__Jwt__Audience:-ClassifiedAds.WebAPI}"
      Modules__Identity__Providers__Google__Enabled: "${Modules__Identity__Providers__Google__Enabled:-false}"
      Modules__Identity__Providers__Google__ClientId: "${Modules__Identity__Providers__Google__ClientId:-}"
      Modules__Subscription__PayOS__ClientId: "${Modules__Subscription__PayOS__ClientId:-}"
      Modules__Subscription__PayOS__ApiKey: "${Modules__Subscription__PayOS__ApiKey:-}"
      Modules__Subscription__PayOS__ChecksumKey: "${Modules__Subscription__PayOS__ChecksumKey:-}"
      Modules__Subscription__PayOS__BaseUrl: "${Modules__Subscription__PayOS__BaseUrl:-https://api-merchant.payos.vn}"
      Modules__Subscription__PayOS__ReturnUrl: "${Modules__Subscription__PayOS__ReturnUrl:-}"
      Modules__Subscription__PayOS__WebhookUrl: "${Modules__Subscription__PayOS__WebhookUrl:-}"
      Modules__Subscription__PayOS__CancelUrl: "${Modules__Subscription__PayOS__CancelUrl:-}"
      Modules__Subscription__PayOS__FrontendBaseUrl: "${Modules__Subscription__PayOS__FrontendBaseUrl:-}"
      Modules__Storage__Provider: "Local"
      Modules__Storage__Local__Path: "/files"
      Modules__TestGeneration__N8nIntegration__BaseUrl: "${Modules__TestGeneration__N8nIntegration__BaseUrl:-https://tinem226.app.n8n.cloud/webhook/}"
      Modules__TestGeneration__N8nIntegration__ApiKey: "${Modules__TestGeneration__N8nIntegration__ApiKey:-}"
      Modules__TestGeneration__N8nIntegration__BeBaseUrl: "${Modules__TestGeneration__N8nIntegration__BeBaseUrl:-http://localhost:9002}"
      Modules__TestGeneration__N8nIntegration__CallbackApiKey: "${Modules__TestGeneration__N8nIntegration__CallbackApiKey:-n8n-callback-secret-2026}"
      Modules__TestGeneration__N8nIntegration__UseDotnetIntegrationWorkflowForGeneration: "${Modules__TestGeneration__N8nIntegration__UseDotnetIntegrationWorkflowForGeneration:-true}"
      Modules__TestGeneration__N8nIntegration__Webhooks__generate-test-cases-unified: "${Modules__TestGeneration__N8nIntegration__Webhooks__generate-test-cases-unified:-generate-test-cases-unified}"
      Modules__TestGeneration__N8nIntegration__Webhooks__generate-llm-suggestions: "${Modules__TestGeneration__N8nIntegration__Webhooks__generate-llm-suggestions:-generate-llm-suggestions}"
      Modules__TestGeneration__N8nIntegration__Webhooks__explain-failure: "${Modules__TestGeneration__N8nIntegration__Webhooks__explain-failure:-explain-failure}"
      Modules__TestGeneration__N8nIntegration__Webhooks__analyze-srs: "${Modules__TestGeneration__N8nIntegration__Webhooks__analyze-srs:-analyze-srs}"
      Modules__TestGeneration__N8nIntegration__Webhooks__refine-srs-requirements: "${Modules__TestGeneration__N8nIntegration__Webhooks__refine-srs-requirements:-refine-srs-requirements}"
      Modules__LlmAssistant__FailureExplanation__Provider: "${Modules__LlmAssistant__FailureExplanation__Provider:-N8n}"
      Modules__LlmAssistant__FailureExplanation__Model: "${Modules__LlmAssistant__FailureExplanation__Model:-gpt-4.1-mini}"
      Modules__LlmAssistant__FailureExplanation__TimeoutSeconds: "${Modules__LlmAssistant__FailureExplanation__TimeoutSeconds:-300}"
      Modules__LlmAssistant__FailureExplanation__CacheTtlHours: "${Modules__LlmAssistant__FailureExplanation__CacheTtlHours:-24}"
      Modules__LlmAssistant__FailureExplanation__BaseUrl: "${Modules__LlmAssistant__FailureExplanation__BaseUrl:-https://tinem225.app.n8n.cloud/webhook/}"
      Modules__LlmAssistant__FailureExplanation__ApiKey: "${Modules__LlmAssistant__FailureExplanation__ApiKey:-}"
      Modules__LlmAssistant__FailureExplanation__WebhookPath: "${Modules__LlmAssistant__FailureExplanation__WebhookPath:-explain-failure}"

  background:
    image: classifiedads.modularmonolith.background
    build:
      context: .
      dockerfile: ./ClassifiedAds.Background/Dockerfile
    depends_on:
      migrator:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
        required: false
      mailhog:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: "${DOTNET_ENVIRONMENT:-Development}"
      CheckDependency__Enabled: "true"
      CheckDependency__Host: "rabbitmq:5672"
      Messaging__Provider: "RabbitMQ"
      Messaging__RabbitMQ__HostName: "rabbitmq"
      Messaging__RabbitMQ__UserName: ${Messaging__RabbitMQ__UserName:-guest}
      Messaging__RabbitMQ__Password: ${Messaging__RabbitMQ__Password:-guest}
      Caching__Distributed__Provider: "Redis"
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      Caching__Distributed__Redis__InstanceName: "${Caching__Distributed__Redis__InstanceName:-ClassifiedAds_}"
      ConnectionStrings__Default: "${SUPABASE_CONNECTION_STRING:?SUPABASE_CONNECTION_STRING must be set for Supabase deployment}"
      Modules__Notification__Email__Provider: "SmtpClient"
      Modules__Notification__Email__SmtpClient__Host: "mailhog"
      Modules__Notification__Email__SmtpClient__Port: "1025"
      Modules__Notification__Email__SmtpClient__EnableSsl: "false"
      Modules__Notification__EmailQueue__ChannelCapacity: "64"
      Modules__Notification__EmailQueue__MaxDegreeOfParallelism: "3"
      Modules__Notification__EmailQueue__MaxRetryAttempts: "5"
      Modules__Notification__EmailQueue__SendTimeoutSeconds: "30"
      Modules__Notification__Sms__Provider: "Fake"
      Modules__Notification__Sms__Twilio__AccountSId: ""
      Modules__Notification__Sms__Twilio__AuthToken: ""
      Modules__Notification__Sms__Twilio__FromNumber: ""
      Modules__Notification__Web__Provider: "Fake"
      Modules__Notification__Web__SignalR__Endpoint: "http://notificationserver"
      Modules__Subscription__PayOS__ClientId: "${Modules__Subscription__PayOS__ClientId:-}"
      Modules__Subscription__PayOS__ApiKey: "${Modules__Subscription__PayOS__ApiKey:-}"
      Modules__Subscription__PayOS__ChecksumKey: "${Modules__Subscription__PayOS__ChecksumKey:-}"
      Modules__Subscription__PayOS__BaseUrl: "${Modules__Subscription__PayOS__BaseUrl:-https://api-merchant.payos.vn}"
      Modules__Subscription__PayOS__ReturnUrl: "${Modules__Subscription__PayOS__ReturnUrl:-}"
      Modules__Subscription__PayOS__WebhookUrl: "${Modules__Subscription__PayOS__WebhookUrl:-}"
      Modules__Subscription__PayOS__CancelUrl: "${Modules__Subscription__PayOS__CancelUrl:-}"
      Modules__Subscription__PayOS__FrontendBaseUrl: "${Modules__Subscription__PayOS__FrontendBaseUrl:-}"
      Modules__Storage__Provider: "Local"
      Modules__Storage__Local__Path: "/files"
      Modules__TestGeneration__N8nIntegration__BaseUrl: "${Modules__TestGeneration__N8nIntegration__BaseUrl:-https://tinem226.app.n8n.cloud/webhook/}"
      Modules__TestGeneration__N8nIntegration__ApiKey: "${Modules__TestGeneration__N8nIntegration__ApiKey:-}"
      Modules__TestGeneration__N8nIntegration__BeBaseUrl: "${Modules__TestGeneration__N8nIntegration__BeBaseUrl:-http://webapi:8080}"
      Modules__TestGeneration__N8nIntegration__CallbackApiKey: "${Modules__TestGeneration__N8nIntegration__CallbackApiKey:-n8n-callback-secret-2026}"
      Modules__TestGeneration__N8nIntegration__UseDotnetIntegrationWorkflowForGeneration: "${Modules__TestGeneration__N8nIntegration__UseDotnetIntegrationWorkflowForGeneration:-true}"
      Modules__TestGeneration__N8nIntegration__Webhooks__generate-test-cases-unified: "${Modules__TestGeneration__N8nIntegration__Webhooks__generate-test-cases-unified:-generate-test-cases-unified}"
      Modules__TestGeneration__N8nIntegration__Webhooks__generate-llm-suggestions: "${Modules__TestGeneration__N8nIntegration__Webhooks__generate-llm-suggestions:-generate-llm-suggestions}"
      Modules__TestGeneration__N8nIntegration__Webhooks__explain-failure: "${Modules__TestGeneration__N8nIntegration__Webhooks__explain-failure:-explain-failure}"
      Modules__TestGeneration__N8nIntegration__Webhooks__analyze-srs: "${Modules__TestGeneration__N8nIntegration__Webhooks__analyze-srs:-analyze-srs}"
      Modules__TestGeneration__N8nIntegration__Webhooks__refine-srs-requirements: "${Modules__TestGeneration__N8nIntegration__Webhooks__refine-srs-requirements:-refine-srs-requirements}"
      Modules__LlmAssistant__FailureExplanation__Provider: "${Modules__LlmAssistant__FailureExplanation__Provider:-N8n}"
      Modules__LlmAssistant__FailureExplanation__Model: "${Modules__LlmAssistant__FailureExplanation__Model:-gpt-4.1-mini}"
      Modules__LlmAssistant__FailureExplanation__TimeoutSeconds: "${Modules__LlmAssistant__FailureExplanation__TimeoutSeconds:-300}"
      Modules__LlmAssistant__FailureExplanation__CacheTtlHours: "${Modules__LlmAssistant__FailureExplanation__CacheTtlHours:-24}"
      Modules__LlmAssistant__FailureExplanation__BaseUrl: "${Modules__LlmAssistant__FailureExplanation__BaseUrl:-https://tinem225.app.n8n.cloud/webhook/}"
      Modules__LlmAssistant__FailureExplanation__ApiKey: "${Modules__LlmAssistant__FailureExplanation__ApiKey:-}"
      Modules__LlmAssistant__FailureExplanation__WebhookPath: "${Modules__LlmAssistant__FailureExplanation__WebhookPath:-explain-failure}"

volumes:
  redis_data:
